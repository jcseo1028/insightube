{% extends "base.html" %}

{% block title %}InSighTube — YouTube 영상 AI 요약{% endblock %}

{% block content %}
<div class="space-y-8">
    <!-- URL 입력 섹션 -->
    <section class="bg-white dark:bg-gray-800 rounded-2xl shadow-md p-6 md:p-8">
        <h2 class="text-xl font-semibold mb-4">YouTube 영상 요약하기</h2>
        <p class="text-gray-500 dark:text-gray-400 text-sm mb-6">
            YouTube 영상 URL을 입력하면 AI가 핵심 내용을 요약해드립니다.
        </p>

        <form
            hx-post="/summarize"
            hx-target="#summary-result"
            hx-indicator="#loading-indicator"
            hx-swap="innerHTML"
            class="space-y-4"
        >
            <!-- URL 입력 -->
            <div class="flex flex-col sm:flex-row gap-3">
                <input
                    type="text"
                    name="url"
                    id="url-input"
                    placeholder="https://www.youtube.com/watch?v=..."
                    required
                    class="flex-1 px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600
                           bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100
                           placeholder-gray-400 dark:placeholder-gray-500
                           focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                           transition-colors"
                >
                <button
                    type="submit"
                    class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium
                           rounded-xl transition-colors focus:outline-none focus:ring-2
                           focus:ring-indigo-500 focus:ring-offset-2 whitespace-nowrap
                           disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    요약하기
                </button>
            </div>

            <!-- 요약 옵션 토글 -->
            <details class="group">
                <summary class="cursor-pointer select-none text-sm text-gray-500 dark:text-gray-400
                                hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors
                                flex items-center gap-1">
                    <svg class="w-4 h-4 transition-transform group-open:rotate-90" fill="none"
                         stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 5l7 7-7 7"/>
                    </svg>
                    요약 옵션
                </summary>

                <div class="mt-4 p-4 bg-gray-50 dark:bg-gray-700/50 rounded-xl space-y-4">
                    <!-- 상세도 수준 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                            요약 상세도
                        </label>
                        <div class="flex flex-wrap gap-2">
                            <label class="inline-flex items-center">
                                <input type="radio" name="detail_level" value="brief"
                                       class="sr-only peer">
                                <span class="px-4 py-2 text-sm rounded-lg border border-gray-300
                                             dark:border-gray-600 cursor-pointer transition-all
                                             peer-checked:bg-indigo-600 peer-checked:text-white
                                             peer-checked:border-indigo-600
                                             hover:border-indigo-400 dark:hover:border-indigo-400
                                             text-gray-700 dark:text-gray-300">
                                    간단
                                </span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="radio" name="detail_level" value="normal"
                                       checked
                                       class="sr-only peer">
                                <span class="px-4 py-2 text-sm rounded-lg border border-gray-300
                                             dark:border-gray-600 cursor-pointer transition-all
                                             peer-checked:bg-indigo-600 peer-checked:text-white
                                             peer-checked:border-indigo-600
                                             hover:border-indigo-400 dark:hover:border-indigo-400
                                             text-gray-700 dark:text-gray-300">
                                    보통
                                </span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="radio" name="detail_level" value="detailed"
                                       class="sr-only peer">
                                <span class="px-4 py-2 text-sm rounded-lg border border-gray-300
                                             dark:border-gray-600 cursor-pointer transition-all
                                             peer-checked:bg-indigo-600 peer-checked:text-white
                                             peer-checked:border-indigo-600
                                             hover:border-indigo-400 dark:hover:border-indigo-400
                                             text-gray-700 dark:text-gray-300">
                                    상세
                                </span>
                            </label>
                        </div>
                        <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">
                            간단: 핵심만 짧게 · 보통: 기본 요약 · 상세: 풍부한 디테일 포함
                        </p>
                    </div>

                    <!-- 주요 포인트 수 / 키워드 수 -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label for="max_key_points"
                                   class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                                최대 주요 포인트 수
                            </label>
                            <input type="range" id="max_key_points" name="max_key_points"
                                   min="3" max="15" value="7" step="1"
                                   class="w-full accent-indigo-600"
                                   oninput="this.nextElementSibling.textContent = this.value + '개'">
                            <span class="text-xs text-gray-500 dark:text-gray-400">7개</span>
                        </div>
                        <div>
                            <label for="max_keywords"
                                   class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                                최대 키워드 수
                            </label>
                            <input type="range" id="max_keywords" name="max_keywords"
                                   min="3" max="10" value="5" step="1"
                                   class="w-full accent-indigo-600"
                                   oninput="this.nextElementSibling.textContent = this.value + '개'">
                            <span class="text-xs text-gray-500 dark:text-gray-400">5개</span>
                        </div>
                    </div>

                    <!-- 전체 스크립트 포함 -->
                    <div class="flex items-center gap-3">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" name="include_transcript" value="on"
                                   checked
                                   class="sr-only peer">
                            <div class="w-11 h-6 bg-gray-200 dark:bg-gray-600 rounded-full
                                        peer-checked:bg-indigo-600
                                        peer-focus:ring-2 peer-focus:ring-indigo-300
                                        after:content-[''] after:absolute after:top-[2px] after:left-[2px]
                                        after:bg-white after:rounded-full after:h-5 after:w-5
                                        after:transition-all peer-checked:after:translate-x-full">
                            </div>
                        </label>
                        <span class="text-sm text-gray-700 dark:text-gray-300">
                            전체 스크립트(자막) 함께 보기
                        </span>
                    </div>
                </div>
            </details>
        </form>
    </section>

    <!-- 로딩 인디케이터 -->
    <div id="loading-indicator" class="htmx-indicator flex flex-col items-center justify-center py-12">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-200 border-t-indigo-600"></div>
        <p class="mt-4 text-gray-500 dark:text-gray-400 text-sm">
            영상을 분석하고 있습니다... 잠시만 기다려주세요.
        </p>
    </div>

    <!-- 요약 결과 영역 -->
    <div id="summary-result"></div>
</div>
{% endblock %}
